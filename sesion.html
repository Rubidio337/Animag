<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMAG - Iniciar Sesión</title>
    <link rel="icon" type="image/png" href="imagenes/logo.jpeg">
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#121212;
}


h2{
    text-align:center;
    margin-bottom:20px;
    color:white;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #333;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
}

input::placeholder{
    color:#a0a0a0;
}

input:focus{
    outline:none;
    border-color:#e53935;
}

.btn-reproducir{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#47588f;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    display: flex;
    text-align: center;
}

.btn-reproducir:hover{
    background:#586fbd;
}

.registro{
    text-align:center;
    margin-top:15px;
    color:#bdbdbd;
}

.registro a{
    text-decoration:none;
    font-weight:bold;
    color:#00bfff;
}

.registro a:hover{
    text-decoration:underline;
}

.login {
  max-width: 400px;   
  margin: 50px auto;        
  padding: 30px;
  background-color: #1a1919;  
  border-radius: 12px;      
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); 
  
  
  display: flex;
  flex-direction: column;   
  align-items: center;    
}


.logo-login {
  width: 160px;             
  height: 160px;            
  object-fit: cover;  
  border-radius: 50%;    
  margin-bottom: 20px;   
  display: block;       
}


.login form {
  width: 100%;
}


.login input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
}

.registro {
  margin-top: 20px;
  font-size: 0.9rem;
  color: #666666;
  text-align: center;
}


</style>

</head>
<body>

    <div class="login">
  <img src="imagenes/animag.jpeg" alt="animag" class="logo-login">

  <h2>Iniciar Sesión</h2>

  <form>
    <input type="email" placeholder="Correo electrónico">
    <input type="password" placeholder="Contraseña">
    
    <a href="index.html" class="btn btn-reproducir w-100 mt-2">Entrar</a>
  </form>

  <div class="registro">
    ¿No tienes cuenta?
    <a href="#">Registrarse</a>
  </div>
</div>

</body>
</html>
